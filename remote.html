<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chile-Robot Remote</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000;
            color: #fff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            border-bottom: 1px solid #222;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .status-text {
            font-size: 0.9rem;
            color: #aaa;
        }

        .alarm-form {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input[type="time"],
        .form-group input[type="text"],
        .form-group input[type="url"],
        .form-group textarea,
        .form-group select {
            width: 100%;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
        }

        .form-group select {
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23fff'><path d='M7 10l5 5 5-5z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 16px;
        }

        /* ---------- TOGGLE ---------- */
        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
            background: #333;
            border-radius: 12px;
            cursor: pointer;
            transition: background .2s;
            margin: 0;
        }
        .toggle-switch.on {
            background: #ff3b30;
        }
        .toggle-switch .toggle-knob {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            transition: left .2s;
        }
        .toggle-switch.on .toggle-knob {
            left: 22px;
        }
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .action-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px 24px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background .2s;
            margin-top: 10px;
        }
        .action-btn:hover {
            background: #ccc;
        }

        .btn-danger {
            background: #ff3b30 !important;
            color: #fff !important;
        }
        .btn-danger:hover {
            background: #cc2f26 !important;
        }

        /* ---------- LISTA DE ALARMAS ---------- */
        #alarm-list-container {
            margin-top: 20px;
            border-top: 1px solid #222;
            padding-top: 15px;
        }
        #alarm-list-container h3 {
            font-size: 0.9rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        .alarm-item {
            background: #111;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .alarm-item.selected {
            border: 2px solid #ff3b30;
        }
        .alarm-info {
            flex: 1;
        }
        .alarm-info .time {
            font-size: 1.2rem;
            font-weight: 600;
        }
        .alarm-info .mode {
            font-size: 0.75rem;
            color: #aaa;
            text-transform: uppercase;
            margin-top: 2px;
        }
        .alarm-actions {
            display: flex;
            gap: 8px;
        }
        .alarm-actions button {
            flex: 1;
            padding: 8px 12px;
            font-size: 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            transition: background .2s;
        }
        .alarm-actions .toggle-btn {
            background: #222;
            color: #fff;
            border: 1px solid #444;
        }
        .alarm-actions .toggle-btn.active {
            background: #ff3b30;
            color: #000;
        }
        .alarm-actions .delete-btn {
            background: transparent;
            color: #ff3b30;
            border: 1px solid #ff3b30;
        }
        .alarm-actions .delete-btn:hover {
            background: #ff3b30;
            color: #000;
        }

        /* ---------- SECCIÓN FOCUS MODE ---------- */
        .focus-section {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #222;
        }
        .focus-section h3 {
            font-size: 0.9rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        .focus-controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .focus-toggle-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .focus-volume-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .focus-volume-row label {
            flex: 0 0 80px;
            font-size: 0.85rem;
            color: #888;
        }
        .focus-volume-row input[type="range"] {
            flex: 1;
            height: 4px;
            background: #444;
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }
        .focus-volume-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            background: #ff3b30;
            border-radius: 50%;
            cursor: pointer;
        }
        .focus-volume-value {
            flex: 0 0 40px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #fff;
            text-align: right;
        }

        /* ---------- INPUT CON ICONO ---------- */
        .input-with-icon {
            position: relative;
        }
        .input-with-icon input {
            padding-right: 30px;
        }
        .input-with-icon button {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 1rem;
            padding: 0;
            transition: color .2s;
        }
        .input-with-icon button:hover {
            color: #fff;
        }

        /* ---------- TABS ---------- */
        .tabs-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            display: flex;
            border-top: 1px solid #222;
            background: #000;
        }
        .tab {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.85rem;
            color: #666;
            transition: color .2s;
        }
        .tab.active {
            color: #ff3b30;
        }
        .tab .icon {
            font-size: 1.2rem;
            margin-bottom: 4px;
        }

        /* ---------- VISTA PREVIA TONO ---------- */
        .preview-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 1rem;
            padding: 0;
            transition: color .2s;
        }
        .preview-btn:hover {
            color: #fff;
        }
    </style>
</head>
<body>

<!-- Status de conexión -->
<div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <div class="status-text" id="status-text">Verificando conexión...</div>
</div>

<!-- Formulario de alarma -->
<div class="alarm-form">
    <!-- Hora de alarma -->
    <div class="form-group">
        <label for="alarm-time">Hora de alarma</label>
        <input type="time" id="alarm-time">
    </div>

    <!-- Toggle Modo Despertador -->
    <div class="form-group">
        <div class="toggle-row">
            <label for="despertador-toggle">Modo Despertador</label>
            <div class="toggle-switch" id="despertador-toggle">
                <div class="toggle-knob"></div>
            </div>
        </div>
    </div>

    <!-- Botón para abrir configuración -->
    <div class="form-group">
        <button id="configurar-btn" class="action-btn">Configurar Alarma</button>
    </div>

    <!-- Panel expandible -->
    <div class="despertador-panel" id="despertador-panel" style="display: none;">
        <hr class="divider" style="border: none; border-top: 1px solid #222; margin: 15px 0;">

        <!-- Selector de tono -->
        <div class="form-group">
            <label for="tone-select">Tono de alarma</label>
            <div class="input-with-icon">
                <select id="tone-select">
                    <option value="lesiakower-lo-fi-alarm-clock-243766.mp3">Lo-fi Alarm</option>
                    <option value="freesound_community-alarm-clock-90867.mp3">Alarm Clock Clasico</option>
                    <option value="Tono Incendio.mpeg">Tono Incendio</option>
                </select>
                <button class="preview-btn" id="preview-tone-btn">▶️</button>
            </div>
        </div>

        <!-- Mensaje TTS -->
        <div class="form-group">
            <label for="tts-message">¿Qué quieres que diga?</label>
            <input type="text" id="tts-message" placeholder="Ej: ¡Arriba campeón, hoy va a ser un gran día!">
        </div>

        <!-- Pendientes/Recordatorios -->
        <div class="form-group">
            <label for="reminders">¿Qué quieres que salga en pantalla?</label>
            <textarea id="reminders" placeholder="Ej:
- Entregar informe a las 10
- Llamar al doctor
- Comprar pan"></textarea>
        </div>

        <!-- Link de Spotify -->
        <div class="form-group">
            <label for="spotify-link">Link de Spotify</label>
            <input type="url" id="spotify-link" placeholder="Link de Spotify (canción, playlist, álbum)...">
        </div>

        <!-- Comando Alexa -->
        <div class="form-group">
            <label for="alexa-command">Comando para Alexa</label>
            <input type="text" id="alexa-command" placeholder="Ej: reproduce mi playlist de Spotify">
        </div>

        <hr class="divider" style="border: none; border-top: 1px solid #222; margin: 15px 0;">
        <p style="color: #555; font-size: 0.7rem; text-align: left;">
            Secuencia: sonido ×2 → clima + fecha + mensaje por voz → pendientes en pantalla → Alexa / Spotify
        </p>
    </div>

    <!-- Lista de alarmas -->
    <div id="alarm-list-container">
        <h3>Alarmas activas</h3>
        <div id="alarm-list">
            <!-- Las alarmas se inyectarán aquí -->
        </div>
        <!-- Botón eliminar seleccionada (oculto hasta que se seleccione) -->
        <button id="delete-selected-btn" class="action-btn btn-danger" style="display:none; margin-top:10px;">
            Eliminar Seleccionada
        </button>
    </div>

    <!-- Botones -->
    <div style="display:flex; gap:10px; margin-top:15px;">
        <button id="save-btn" class="action-btn">Guardar Alarma</button>
        <button id="stop-btn" class="action-btn btn-danger">APAGAR ALARMA</button>
    </div>
</div>

<!-- Tabs de vista -->
<div class="tabs-container">
    <div class="tab active" id="tab-clock">
        <div class="icon">⏰</div>
        <div>Reloj</div>
    </div>
    <div class="tab" id="tab-finance">
        <div class="icon">$</div>
        <div>Finanzas</div>
    </div>
    <div class="tab" id="tab-calendar">
        <div class="icon">📅</div>
        <div>Calendario</div>
    </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
    // Firebase configuration from CREDENCIALES.md
    const firebaseConfig = {
        apiKey: "AIzaSyAZ_6YiC9FJTwwkPPMhT7SpdOgyRW5nbsg",
        authDomain: "juanech-sa.firebaseapp.com",
        databaseURL: "https://juanech-sa-default-rtdb.firebaseio.com",
        projectId: "juanech-sa",
        storageBucket: "juanech-sa.firebasestorage.app",
        messagingSenderId: "310883397247",
        appId: "1:310883397247:web:be8090e93bdd43a429194a"
    };

    // Inicializar Firebase (evitar re-inicialización)
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    // Elementos DOM
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const alarmTimeInput = document.getElementById('alarm-time');
    const despertadorToggle = document.getElementById('despertador-toggle');
    const despertadorPanel = document.getElementById('despertador-panel');
    const toneSelect = document.getElementById('tone-select');
    const previewToneBtn = document.getElementById('preview-tone-btn');
    const ttsMessageInput = document.getElementById('tts-message');
    const remindersInput = document.getElementById('reminders');
    const spotifyLinkInput = document.getElementById('spotify-link');
    const alexaCommandInput = document.getElementById('alexa-command');
    const saveBtn = document.getElementById('save-btn');
    const stopBtn = document.getElementById('stop-btn');
    const deleteSelectedBtn = document.getElementById('delete-selected-btn');
    const tabClock = document.getElementById('tab-clock');
    const tabFinance = document.getElementById('tab-finance');
    const tabCalendar = document.getElementById('tab-calendar');
    const alarmList = document.getElementById('alarm-list');

    // Estado local
    let selectedAlarmKey = null; // clave Firebase de la alarma seleccionada
let despertadorMode = false; // estado del modo despertador

    // Actualizar estado de conexión
    const statusRef = db.ref('chile-robot/status');
    statusRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data && data.online === true) {
            statusDot.style.background = '#4cd964'; // verde
            statusText.textContent = `Conectado: ${data.device || 'Desconocido'}`;
        } else {
            statusDot.style.background = '#ff3b30'; // rojo
            statusText.textContent = 'Sin conexion';
        }
    });

    // Toggle modo despertador (solo actualiza estado)
    despertadorToggle.addEventListener('click', () => {
        despertadorMode = !despertadorMode;
        despertadorToggle.classList.toggle('on', despertadorMode);
    });

    // Preview tone
    previewToneBtn.addEventListener('click', () => {
        const selectedTone = toneSelect.value;
        if (audioContext) {
            audioContext.close();
        }
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        fetch(selectedTone)
            .then(response => response.arrayBuffer())
            .then(arrayBuffer => audioContext.decodeAudioData(arrayBuffer))
            .then(audioBuffer => {
                const source = audioContext.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(audioContext.destination);
                source.start(0);
            })
            .catch(err => {
                console.error('Error al reproducir tono:', err);
                alert('No se pudo reproducir el tono. Asegúrate de que el archivo exista.');
            });
    });
    let audioContext = null;

    // Guardar alarma
    saveBtn.addEventListener('click', () => {
        const alarmData = {
            time: alarmTimeInput.value,
            despertadorMode: despertadorToggle.classList.contains('on'),
            tone: toneSelect.value,
            ttsMessage: ttsMessageInput.value.trim(),
            reminders: remindersInput.value.trim(),
            spotifyLink: spotifyLinkInput.value.trim(),
            alexaCommand: alexaCommandInput.value.trim(),
            active: true // Nueva alarma siempre activa
        };
        // Push a nueva alarma bajo /chile-robot/alarms
        db.ref('chile-robot/alarms').push(alarmData)
            .then(() => {
                // Feedback visual opcional
                saveBtn.textContent = 'Guardado!';
                setTimeout(() => { saveBtn.textContent = 'Guardar Alarma'; }, 1500);
                // Limpiar selección
                selectedAlarmKey = null;
                updateDeleteButtonVisibility();
                // Resetear formulario opcional
                // alarmTimeInput.value = '';
                // ttsMessageInput.value = '';
                // remindersInput.value = '';
                // spotifyLinkInput.value = '';
                // alexaCommandInput.value = '';
            })
            .catch(err => {
                console.error('Error al guardar alarma:', err);
                alert('Error al guardar la alarma. Consulta la consola para detalles.');
            });
    });

    // Apagar alarma (envía señal de apagado global)
    stopBtn.addEventListener('click', () => {
        db.ref('chile-robot/alarm/stopAlarm').set(true)
            .then(() => {
                // feedback visual
                stopBtn.textContent = 'Apagado!';
                setTimeout(() => { stopBtn.textContent = 'APAGAR ALARMA'; }, 1500);
            })
            .catch(err => {
                console.error('Error al apagar alarma:', err);
                alert('Error al apagar la alarma.');
            });
    });

    // Eliminar alarma seleccionada
    deleteSelectedBtn.addEventListener('click', () => {
        if (!selectedAlarmKey) return;
        db.ref(`chile-robot/alarms/${selectedAlarmKey}`).remove()
            .then(() => {
                selectedAlarmKey = null;
                updateDeleteButtonVisibility();
            })
            .catch(err => {
                console.error('Error al eliminar alarma:', err);
                alert('No se pudo eliminar la alarma.');
            });
    });

    /// FOCUS MODE CONTROLS ///
    const focusToggle = document.createElement('div');
    focusToggle.innerHTML = `
        <div class="form-group focus-section">
            <h3>Modo concentración</h3>
            <div class="focus-controls">
                <div class="focus-toggle-row">
                    <label for="focus-toggle">Activar</label>
                    <div class="toggle-switch" id="focus-toggle-switch">
                        <div class="toggle-knob"></div>
                    </div>
                </div>
                <div class="focus-volume-row">
                    <label for="focus-volume">Volumen</label>
                    <input type="range" id="focus-volume" min="0" max="100" value="50">
                    <span class="focus-volume-value" id="focus-volume-value">50</span>
                </div>
            </div>
        </div>
    `;
    document.querySelector('.alarm-form').appendChild(focusToggle);

    const focusToggleSwitch = document.getElementById('focus-toggle-switch');
    const focusVolumeInput = document.getElementById('focus-volume');
    const focusVolumeValue = document.getElementById('focus-volume-value');

    focusToggleSwitch.addEventListener('click', () => {
        const activo = !focusToggleSwitch.classList.contains('on');
        focusToggleSwitch.classList.toggle('on', activo);
        focusVolumeInput.disabled = !activo;
        // Escribe el estado en Firebase
        db.ref('chile-robot/focusMode').set({
            active: activo,
            volume: activo ? parseInt(focusVolumeInput.value, 10) : 0
        });
    });

    focusVolumeInput.addEventListener('input', () => {
        const vol = parseInt(focusVolumeInput.value, 10);
        focusVolumeValue.textContent = vol;
        // Actualizar volumen en Firebase si está activo
        if (focusToggleSwitch.classList.contains('on')) {
            db.ref('chile-robot/focusMode/volume').set(vol);
        }
    });

    // Botón para mostrar/ocultar panel de configuración
    const configurarBtn = document.getElementById('configurar-btn');
    configurarBtn.addEventListener('click', () => {
        const isShow = despertadorPanel.style.display === 'block';
        despertadorPanel.style.display = isShow ? 'none' : 'block';
        if (!isShow) {
            alarmTimeInput.focus();
        }
    });

    // Inicializar: establecer modo despertador según estado inicial (opcional)
    // y cargar valores actuales desde Firebase si existen
    const alarmRef = db.ref('chile-robot/alarm');
    alarmRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            // Actualizar form con valores almacenados
            if (data.time) alarmTimeInput.value = data.time;
            if (data.despertadorMode !== undefined) {
                const activo = data.despertadorMode;
                despertadorToggle.classList.toggle('on', activo);
                despertadorMode = activo;
            }
            if (data.tone) toneSelect.value = data.tone;
            if (data.ttsMessage) ttsMessageInput.value = data.ttsMessage;
            if (data.reminders) remindersInput.value = data.reminders;
            if (data.spotifyLink) spotifyLinkInput.value = data.spotifyLink;
            if (data.alexaCommand) alexaCommandInput.value = data.alexaCommand;
        }
    });

    // ----------------- LISTA DE ALARMAS EN TIEMPO REAL -----------------
    const alarmsRef = db.ref('chile-robot/alarms');
    alarmsRef.on('value', (snapshot) => {
        const data = snapshot.val();
        alarmList.innerHTML = ''; // limpiar
        if (!data) {
            alarmList.innerHTML = '<div style="text-align:center; color:#555; padding:20px;">No hay alarmas activas</div>';
            return;
        }
        // Convertir objeto a array de entries
        const entries = Object.entries(data);
        entries.forEach(([key, alarm]) => {
            if (!alarm) return;
            const div = document.createElement('div');
            div.className = 'alarm-item';
            div.dataset.key = key;
            // Highlight si está seleccionada
            if (key === selectedAlarmKey) div.classList.add('selected');

            const timeStr = alarm.time || '--:--';
            const modeStr = alarm.despertadorMode ? 'Despertador' : 'Simple';
            const toneName = {
                'lesiakower-lo-fi-alarm-clock-243766.mp3': 'Lo-fi',
                'freesound_community-alarm-clock-90867.mp3': 'Clásico',
                'Tono Incendio.mpeg': 'Incendio'
            }[alarm.tone] || 'Desconocido';

            div.innerHTML = `
                <div class="alarm-info">
                    <div class="time">${timeStr}</div>
                    <div class="mode">${modeStr} • ${toneName}</div>
                </div>
                <div class="alarm-actions">
                    <button class="alarm-actions toggle-btn">${alarm.active ? 'Activa' : 'Inactiva'}</button>
                    <button class="alarm-actions delete-btn">✕</button>
                </div>
            `;

            // Click en el item para seleccionar
            div.addEventListener('click', (e) => {
                // Evitar que se dispare al click en los botones internos
                if (e.target.classList.contains('toggle-btn') || e.target.classList.contains('delete-btn')) return;
                // Deseleccionar previa
                document.querySelectorAll('.alarm-item.selected').forEach(el => el.classList.remove('selected'));
                div.classList.add('selected');
                selectedAlarmKey = key;
                updateDeleteButtonVisibility();
            });

            // Botón toggle activo/inactiva
            const toggleBtn = div.querySelector('.toggle-btn');
            toggleBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const nuevoEstado = !alarm.active;
                db.ref(`chile-robot/alarms/${key}/active`).set(nuevoEstado);
                // Actualizar UI inmediatamente
                toggleBtn.textContent = nuevoEstado ? 'Activa' : 'Inactiva';
                toggleBtn.classList.toggle('active', nuevoEstado);
            });

            // Botón eliminar
            const deleteBtn = div.querySelector('.delete-btn');
            deleteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (confirm('¿Eliminar esta alarma?')) {
                    db.ref(`chile-robot/alarms/${key}`).remove();
                }
            });

            alarmList.appendChild(div);
        });
    });

    function updateDeleteButtonVisibility() {
        deleteSelectedBtn.style.display = selectedAlarmKey ? 'block' : 'none';
    }

    // Cambiar vista
    function setView(view) {
        db.ref('chile-robot/view/current').set(view)
            .catch(err => console.error('Error al cambiar vista:', err));
    }

    function setActiveTab(activeTab) {
        [tabClock, tabFinance, tabCalendar].forEach(tab => {
            tab.classList.remove('active');
        });
        activeTab.classList.add('active');
    }

    tabClock.addEventListener('click', () => {
        setView('clock');
        setActiveTab(tabClock);
    });
    tabFinance.addEventListener('click', () => {
        setView('finance');
        setActiveTab(tabFinance);
    });
    tabCalendar.addEventListener('click', () => {
        setView('calendar');
        setActiveTab(tabCalendar);
    });

    // Estado inicial: conectado/desconectado
    const connectedRef = db.ref('.info/connected');
    connectedRef.on('value', (snap) => {
        if (snap.val() === true) {
            // Estamos conectados a Firebase
            statusDot.style.background = '#4cd964';
            // El texto se actualizará mediante el listener de statusRef
        } else {
            statusDot.style.background = '#ff3b30';
            statusText.textContent = 'Sin conexion';
        }
    });
</script>
</body>
</html>
